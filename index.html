<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Down Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f7bd0f;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            max-width: 2000px;
            height: auto;
            background-color: #f01d1d;
            outline: none;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline>
        <source src="https://scrolldown.pages.dev/scrolldown.mp4" type="video/mp4">
        Browser Anda tidak mendukung tag video.
    </video>

</body>
</html>
